name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/paperbook

            echo "=== Pre-deploy backup ==="
            ./deploy/backup-db.sh || echo "Backup skipped"

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Building production image ==="
            docker compose -f docker-compose.prod.yml build app

            echo "=== Running migrations ==="
            docker compose -f docker-compose.prod.yml run --rm app npx prisma migrate deploy --schema=./prisma/schema.prisma || echo "No pending migrations"

            echo "=== Restarting app ==="
            docker compose -f docker-compose.prod.yml up -d app

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:3001/api/health && echo " ✓ API healthy" || echo " ✗ API not responding"

            echo "=== Deploy complete ==="
