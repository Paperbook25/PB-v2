###############################################################################
# Paperbook Platform — Docker Compose
#
# Brings up all services from source code (similar to Supabase's local setup).
#
# Usage:
#   docker compose up              # Start all services
#   docker compose up -d           # Start detached
#   docker compose up db           # Start only Postgres
#   docker compose up server       # Start server + DB
#   docker compose down            # Stop everything
#   docker compose down -v         # Stop + remove DB volumes
#   docker compose logs -f server  # Tail server logs
#
# First-time setup:
#   docker compose up db -d        # Start DB first
#   docker compose run --rm server pnpm db:migrate  # Run migrations
#   docker compose run --rm server pnpm db:seed     # Seed data
#   docker compose up              # Start everything
#
# Services:
#   - db       : PostgreSQL 16 (port 5432)
#   - server   : Express API (port 3001)
#   - school   : School portal — Vite dev (port 5173)
#   - admin    : Admin portal — Vite dev (port 5174)
###############################################################################

services:
  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: paperbook-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paperbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperbook_secret}
      POSTGRES_DB: ${POSTGRES_DB:-paperbook}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperbook}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Express API Server
  # --------------------------------------------------------------------------
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: development
    container_name: paperbook-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-paperbook}:${POSTGRES_PASSWORD:-paperbook_secret}@db:5432/${POSTGRES_DB:-paperbook}
      JWT_SECRET: ${JWT_SECRET:-paperbook-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-paperbook-jwt-refresh-secret-change-in-production}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-paperbook-better-auth-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for hot-reload in development
      - ./apps/server/src:/app/apps/server/src:ro
      - ./apps/server/prisma:/app/apps/server/prisma
      - ./packages/shared/src:/app/packages/shared/src:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # School Portal (Vite dev server)
  # --------------------------------------------------------------------------
  school:
    build:
      context: .
      dockerfile: docker/Dockerfile.school
    container_name: paperbook-school
    restart: unless-stopped
    ports:
      - "${SCHOOL_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://server:3001
      VITE_USE_MOCK_API: "false"
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./apps/school/src:/app/apps/school/src:ro
      - ./apps/school/public:/app/apps/school/public:ro
      - ./packages/ui/src:/app/packages/ui/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/api-client/src:/app/packages/api-client/src:ro

  # --------------------------------------------------------------------------
  # Admin Portal (Vite dev server)
  # --------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: paperbook-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5174}:5174"
    environment:
      VITE_API_URL: http://server:3001
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./apps/admin/src:/app/apps/admin/src:ro
      - ./apps/admin/public:/app/apps/admin/public:ro
      - ./packages/ui/src:/app/packages/ui/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro

volumes:
  pgdata:
    driver: local
