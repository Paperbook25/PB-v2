# Render Blueprint — PaperBook Platform (API + School App + Gravity Portal)
# Deploy: connect your repo on Render and it auto-detects this file

databases:
  - name: paperbook-db
    plan: basic
    databaseName: paperbook
    user: paperbook

services:
  - type: web
    name: paperbook-api
    runtime: node
    plan: starter
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: cd apps/server && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: paperbook-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "15m"
      - key: JWT_REFRESH_EXPIRY
        value: "7d"
      - key: CORS_ORIGIN
        value: "https://paperbook.app,https://admin.paperbook.app"
      - key: APP_DOMAIN
        value: "paperbook.app"
      - key: BETTER_AUTH_URL
        value: "https://api.paperbook.app"
